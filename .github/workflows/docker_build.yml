name: tauhid_docker_build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: set up docker build
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        shell: bash
        run: |
          docker build -t tauhid-app .